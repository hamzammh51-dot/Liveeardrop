     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Money - Monetag Integration</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="10785201" data-sdk="show_10785201"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --secondary: #10B981;
            --accent: #F59E0B;
            --danger: #EF4444;
            --dark: #1F2937;
            --darker: #111827;
            --light: #F9FAFB;
            --gray: #6B7280;
            --card-bg: #FFFFFF;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: var(--light);
            min-height: 100vh;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .app-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .app-subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* User Profile */
        .profile-section {
            margin-top: -40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .profile-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 70px 20px 20px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
        }

        .profile-pic {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--card-bg);
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            box-shadow: var(--shadow);
        }

        .user-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .user-balance {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.3);
        }

        /* Content Sections */
        .content-section {
            padding: 20px;
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* Cards & Buttons */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.7rem;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* Ad Modal */
        .ad-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .ad-modal.show {
            display: flex;
        }

        .ad-modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            width: 90%;
            padding: 30px;
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-content">
                <h1 class="app-title">Earn Money</h1>
                <p class="app-subtitle">Watch ads & earn real money</p>
            </div>
        </div>

        <div class="profile-section">
            <div class="profile-card">
                <div class="profile-pic"><i class="fas fa-user"></i></div>
                <h2 class="user-name" id="userName">User</h2>
                <div class="user-balance"><i class="fas fa-coins"></i> $<span id="balanceAmount">0.00</span></div>
            </div>
        </div>

        <div id="home-section" class="content-section active">
            <div class="card">
                <h3>Watch Ads & Earn</h3>
                <p>Watch short video ads to earn $0.05 per ad.</p>
                <button class="btn btn-primary" id="watchAdBtn" onclick="watchAd()">
                    <i class="fas fa-play-circle"></i> Watch Ad & Earn $0.05
                </button>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="#" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
            </div>

        <div class="ad-modal" id="adModal">
            <div class="ad-modal-content">
                <h3>Loading Advertisement...</h3>
                <p id="adStatus">Please wait while the ad loads.</p>
                <button class="btn btn-primary" id="adCloseBtn" style="display: none;" onclick="closeAdModal()">Close & Claim Reward</button>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        let balance = 0.00;

        function watchAd() {
            const adModal = document.getElementById('adModal');
            const adStatus = document.getElementById('adStatus');
            const adCloseBtn = document.getElementById('adCloseBtn');
            
            adModal.classList.add('show');
            adCloseBtn.style.display = 'none';
            adStatus.textContent = "Loading ad...";

            // Calling your specific Monetag SDK function: show_10785201
            if (window.show_10785201) {
                window.show_10785201().then(() => {
                    adStatus.textContent = "Ad completed! You can now claim your reward.";
                    adCloseBtn.style.display = 'block';
                }).catch(err => {
                    adStatus.textContent = "Could not load ad. Please try again later.";
                    adCloseBtn.style.display = 'block';
                    adCloseBtn.textContent = "Close";
                });
            } else {
                // Fallback if SDK fails to load
                setTimeout(() => {
                    adStatus.textContent = "Reward ready (Simulation Mode)";
                    adCloseBtn.style.display = 'block';
                }, 2000);
            }
        }

        function closeAdModal() {
            const adModal = document.getElementById('adModal');
            adModal.classList.remove('show');
            
            // Add Reward
            balance += 0.05;
            document.getElementById('balanceAmount').textContent = balance.toFixed(2);
            showToast("Success! $0.05 added to your balance.");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
